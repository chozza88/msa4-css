<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="08.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="header">
        <h1>가정용 꿀사과</h1>
        <div class="memo">
          <div>흠집이 있고 약간은 못생겼지만 맛과 영양은 그대로입니다.</div>
          <div>질좋은 사과를 저렴하게 즐겨보세요</div>
        </div>
      </header>
      <!-- header -->
      <main class="main">
        <div class="message">
          <span>확인하세요</span>
        </div>
        <!-- message -->
        <div class="banner">
          <div class="banner-item">주문 및 배송</div>
          <div class="banner-item-memo">
            <div><span>오후 2시 이전</span>주문건은 당일 발송합니다</div>
            <div>2시 이후 주문건은 다음날 발송합니다(주말 제외)</div>
          </div>
          <div class="banner-return">교환 및 환불</div>
          <div class="banner-return-memo">
            <div>불만족시 <span>100% 환불해 드립니다.</span></div>
            <div>고객센터로 전화주세요</div>
          </div>
        </div>
        <!-- banner -->
        <div class="alram">
          <div class="alram-item">고객센터</div>
          <div class="alram-item-memo">
            <div>0000-0000</div>
            <div>상담시간 : 오전 9시 ~ 오후 6시 (토/일, 공휴일 휴무)</div>
          </div>
        </div>
        <!-- alram -->
      </main>
      <!-- main -->
    </div>
    <!-- wrap -->
  </body>
</html>
